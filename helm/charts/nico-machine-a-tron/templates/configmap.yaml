apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nico-machine-a-tron.name" . }}-config-files
  namespace: {{ include "nico-machine-a-tron.namespace" . }}
  labels:
    {{- include "nico-machine-a-tron.labels" . | nindent 4 }}
data:
  mat.toml: |
    {{- if .Values.configFiles.matConfig }}
    {{- .Values.configFiles.matConfig | nindent 4 }}
    {{- else }}
    # Machine-A-Tron configuration - generated by Helm
    carbide_api_url = {{ .Values.machineATron.nicoApiUrl | quote }}
    interface = {{ .Values.machineATron.interface | quote }}
    tui_enabled = {{ .Values.machineATron.tuiEnabled }}
    {{- if .Values.machineATron.logFile }}
    log_file = {{ .Values.machineATron.logFile | quote }}
    {{- end }}
    bmc_mock_port = {{ .Values.machineATron.bmcMockPort }}
    use_single_bmc_mock = {{ .Values.machineATron.useSingleBmcMock }}
    mock_bmc_ssh_server = {{ .Values.machineATron.mockBmcSshServer }}
    {{- if .Values.machineATron.mockBmcSshPort }}
    mock_bmc_ssh_port = {{ .Values.machineATron.mockBmcSshPort }}
    {{- end }}
    {{- if .Values.machineATron.configureBmcProxyHost }}
    configure_carbide_bmc_proxy_host = {{ .Values.machineATron.configureBmcProxyHost | quote }}
    {{- end }}
    {{- if .Values.persistence.enabled }}
    persist_dir = {{ .Values.machineATron.persistDir | quote }}
    {{- end }}
    cleanup_on_quit = {{ .Values.machineATron.cleanupOnQuit }}
    register_expected_machines = {{ .Values.machineATron.registerExpectedMachines }}
    {{- if .Values.machineATron.hostBmcPassword }}
    host_bmc_password = {{ .Values.machineATron.hostBmcPassword | quote }}
    {{- end }}
    {{- if .Values.machineATron.dpuBmcPassword }}
    dpu_bmc_password = {{ .Values.machineATron.dpuBmcPassword | quote }}
    {{- end }}
    api_refresh_interval = {{ .Values.machineATron.apiRefreshInterval | quote }}

    {{- range $sectionName, $section := .Values.machines }}
    {{- if $section }}

    [machines.{{ $sectionName }}]
    {{- if $section.hwType }}
    hw_type = {{ $section.hwType | quote }}
    {{- end }}
    host_count = {{ $section.hostCount | default 1 }}
    vpc_count = {{ $section.vpcCount | default 0 }}
    subnets_per_vpc = {{ $section.subnetsPerVpc | default 0 }}
    dpu_per_host_count = {{ $section.dpuPerHostCount | default 1 }}
    dpu_reboot_delay = {{ $section.dpuRebootDelay | default 1 }}
    host_reboot_delay = {{ $section.hostRebootDelay | default 1 }}
    scout_run_interval = {{ $section.scoutRunInterval | default "60s" | quote }}
    run_interval_working = {{ $section.runIntervalWorking | default "1s" | quote }}
    run_interval_idle = {{ $section.runIntervalIdle | default "10s" | quote }}
    network_status_run_interval = {{ $section.networkStatusRunInterval | default "20s" | quote }}
    template_dir = {{ $section.templateDir | default "/opt/machine-a-tron/templates" | quote }}
    oob_dhcp_relay_address = {{ $section.oobDhcpRelayAddress | default "192.168.192.1" | quote }}
    admin_dhcp_relay_address = {{ $section.adminDhcpRelayAddress | default "192.168.176.1" | quote }}
    {{- if $section.networkVirtualizationType }}
    network_virtualization_type = {{ $section.networkVirtualizationType | quote }}
    {{- end }}
    dpus_in_nic_mode = {{ $section.dpusInNicMode | default false }}
    {{- end }}
    {{- end }}
    {{- end }}
